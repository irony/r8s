apiVersion: v1
kind: Namespace
metadata:
  name: r8s-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: r8s-controller
  namespace: r8s-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: r8s-controller
rules:
  - apiGroups: ["r8s.berget.ai"]
    resources: ["r8ssources"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["r8s.berget.ai"]
    resources: ["r8ssources/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["r8s.berget.ai"]
    resources: ["r8ssources/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: r8s-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: r8s-controller
subjects:
  - kind: ServiceAccount
    name: r8s-controller
    namespace: r8s-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: r8s-controller
  namespace: r8s-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: r8s-controller
  template:
    metadata:
      labels:
        app: r8s-controller
    spec:
      serviceAccountName: r8s-controller
      containers:
        - name: controller
          image: ghcr.io/irony/r8s-controller:latest
          env:
            - name: NAMESPACE
              value: "default"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
